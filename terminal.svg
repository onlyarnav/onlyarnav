      <text x="36" y="304"><tspan fill="#79c0ff">AI/ML         </tspan><tspan fill="#c9d1d9">: agentic ai, RAG/OKF, llm orchestration, quantization, mlops, vector db</tspan></text>
      <text x="36" y="332"><tspan fill="#79c0ff">Software      </tspan><tspan fill="#c9d1d9">: backend engineering, distributed systems, microservices, system design</tspan></text>
