<svg width="1000" height="900" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.015"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="windowShadow" x="-30%" y="-10%" width="160%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <clipPath id="windowClip"><rect x="0" y="0" width="1000" height="900" rx="20" ry="20"/></clipPath>
    <style>.mono{
    font-family:'SF Mono','SFMono-Regular','JetBrains Mono',Menlo,Monaco,Consolas,monospace;
    font-size:16px;
    font-weight:400;
    letter-spacing:0;
}</style>
  </defs>

  <rect x="6" y="10" width="988" height="890" rx="20" ry="20" fill="#000000" filter="url(#windowShadow)"/>

  <g clip-path="url(#windowClip)">
    <rect x="0" y="0" width="1000" height="900" fill="url(#bgGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="0" width="1000" height="900" filter="url(#noise)" opacity="0.35"/>

    <rect x="0" y="0" width="1000" height="50" fill="#161b22"/>
    <circle cx="30" cy="24" r="7" fill="#ff5f56"/>
    <circle cx="52" cy="24" r="7" fill="#ffbd2e"/>
    <circle cx="74" cy="24" r="7" fill="#27c93f"/>
    <text x="500" y="29" text-anchor="middle" class="mono" font-size="14" font-weight="500" fill="#c9d1d9">Terminal — zsh</text>
    <line x1="0" y1="50" x2="1000" y2="50" stroke="#30363d" stroke-width="1"/>

    <g class="mono" font-size="16" xml:space="preserve">
      <text x="36" y="80"><tspan fill="#58a6ff">arnav</tspan><tspan fill="#8b949e">@</tspan><tspan fill="#79c0ff">macbook</tspan><tspan fill="#8b949e"> ~ </tspan><tspan fill="#7ee787">%</tspan><tspan fill="#e3b341"> name</tspan></text>
      <text x="36" y="108" fill="#c9d1d9">Arnav Purohit</text>

