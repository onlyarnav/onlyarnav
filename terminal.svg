      <text x="36" y="164" fill="#c9d1d9">Apache Airflow</text>
      <text x="36" y="192" fill="#c9d1d9">Apache Magpie</text>
      <text x="36" y="220" fill="#c9d1d9">Qdrant</text>
      <text x="36" y="248" fill="#c9d1d9">OpenSRE</text>

