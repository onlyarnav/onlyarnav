      <text x="36" y="472" fill="#c9d1d9">Distributed Systems</text>
      <text x="36" y="500" fill="#c9d1d9">Cloud Infrastructure</text>

      <text x="36" y="528"><tspan fill="#58a6ff">arnav</tspan><tspan fill="#8b949e">@</tspan><tspan fill="#79c0ff">macbook</tspan><tspan fill="#8b949e"> ~ </tspan><tspan fill="#7ee787">%</tspan><tspan fill="#e3b341"> toolkit</tspan></text>
      <text x="36" y="556"><tspan fill="#79c0ff">Languages     </tspan><tspan fill="#c9d1d9">: python, java, c#, rust, go, swift</tspan></text>
      <text x="36" y="584"><tspan fill="#79c0ff">Backend       </tspan><tspan fill="#c9d1d9">: fastapi, django, .NET, spring boot</tspan></text>
      <text x="36" y="612"><tspan fill="#79c0ff">Databases     </tspan><tspan fill="#c9d1d9">: NoSQL, postgresql, redis, qdrant</tspan></text>
      <text x="36" y="640"><tspan fill="#79c0ff">AI            </tspan><tspan fill="#c9d1d9">: langchain, llamaindex, claude code, huggingface</tspan></text>

      <text x="36" y="668"><tspan fill="#58a6ff">arnav</tspan><tspan fill="#8b949e">@</tspan><tspan fill="#79c0ff">macbook</tspan><tspan fill="#8b949e"> ~ </tspan><tspan fill="#7ee787">%</tspan><tspan fill="#e3b341"> interests</tspan></text>
      <text x="36" y="696" fill="#c9d1d9">Software Engineering</text>
      <text x="36" y="724" fill="#c9d1d9">Artificial Intelligence</text>
      <text x="36" y="752" fill="#c9d1d9">Distributed Systems</text>
      <text x="36" y="780" fill="#c9d1d9">Open Source</text>
      <text x="36" y="808" fill="#c9d1d9">Vibe Coding</text>

      <text x="36" y="836"><tspan fill="#58a6ff">arnav</tspan><tspan fill="#8b949e">@</tspan><tspan fill="#79c0ff">macbook</tspan><tspan fill="#8b949e"> ~ </tspan><tspan fill="#7ee787">%</tspan><tspan fill="#c9d1d9"> </tspan></text>
      <rect x="209" y="820" width="8" height="20" fill="#7ee787">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" begin="0s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
