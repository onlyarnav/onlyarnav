<svg width="980" height="908" viewBox="0 0 920 550" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.015"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="windowShadow" x="-30%" y="-10%" width="160%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <clipPath id="windowClip"><rect x="0" y="0" width="980" height="908" rx="20" ry="20"/></clipPath>
    <style>.mono{
    font-family:'SF Mono','SFMono-Regular','JetBrains Mono',Menlo,Monaco,Consolas,monospace;
    font-size:16px;
    font-weight:400;
    letter-spacing:0;
}</style>
  </defs>

  <rect x="6" y="10" width="968" height="898" rx="20" ry="20" fill="#000000" filter="url(#windowShadow)"/>

